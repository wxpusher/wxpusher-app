name: PR Build Check

on:
  pull_request:
    branches: [ master, release ]

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:

  # ========== Android Debug 编译检查 ==========
  build-android:
    name: Build Android Debug
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Android Debug APK
      run: ./gradlew :androidApp:assembleProdDebug

  # ========== iOS 编译检查 ==========
  build-ios:
    name: Build iOS
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    # 显式切到 Xcode 26（macos-15 runner 默认 Xcode 是 16.x，自带 iOS 18 SDK）
    # 与发布 workflow 保持一致，避免 PR 通过却发布失败
    - name: Select Xcode 26
      run: |
        XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
        if [ -z "$XCODE_26" ]; then
          echo "::error::macos-15 runner 上没找到 Xcode 26，可用 Xcode 列表："
          ls -d /Applications/Xcode*.app
          exit 1
        fi
        sudo xcode-select -s "$XCODE_26/Contents/Developer"
        xcodebuild -version
        xcrun --show-sdk-version

    # KMM 项目需要 JDK 来编译 shared 模块
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 设置 Ruby 环境（CocoaPods 依赖）
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: false
        working-directory: iosApp

    # 安装 Bundler 依赖
    - name: Bundle install
      run: |
        bundle lock --add-platform ruby
        bundle install --jobs 3
      working-directory: iosApp

    # KMM CocoaPods 集成需要先生成 dummy framework
    - name: Generate KMM dummy framework
      run: ./gradlew :shared:generateDummyFramework

    # 安装 CocoaPods 依赖
    - name: Pod install
      run: bundle exec pod install --repo-update
      working-directory: iosApp

    # 编译检查（跳过签名，只验证代码是否能编译通过）
    - name: Build iOS (no signing)
      run: |
        xcodebuild build \
          -workspace wxpusher.xcworkspace \
          -scheme WxPusher-iOS \
          -configuration Debug \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGNING_ALLOWED=NO
      working-directory: iosApp
