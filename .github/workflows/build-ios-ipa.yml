name: Build iOS IPA

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      app_version:
        description: "App version name"
        value: ${{ jobs.build.outputs.app_version }}
      artifact_name:
        description: "Uploaded artifact name"
        value: ${{ jobs.build.outputs.artifact_name }}

jobs:
  build:
    runs-on: macos-15
    outputs:
      app_version: ${{ steps.get_version.outputs.APP_VERSION }}
      artifact_name: wxpusher-ios-v${{ steps.get_version.outputs.APP_VERSION }}-${{ github.run_id }}.ipa

    steps:
    - uses: actions/checkout@v4

    # ========== 环境配置 ==========

    # KMM 项目需要 JDK 来编译 shared 模块
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 设置 Ruby 环境（CocoaPods 依赖）
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
        working-directory: iosApp

    # KMM CocoaPods 集成需要先生成 dummy framework，否则 pod install 会失败
    - name: Generate KMM dummy framework
      run: ./gradlew :shared:generateDummyFramework

    # 安装 CocoaPods 依赖
    - name: Pod install
      run: bundle exec pod install --repo-update
      working-directory: iosApp

    # ========== 签名配置 ==========

    # 从 Secrets 导入证书和描述文件到临时 Keychain
    - name: Import certificate and provisioning profile
      env:
        CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: ${{ github.run_id }}
      run: |
        # 创建临时文件路径
        CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
        PP_PATH=$RUNNER_TEMP/profile.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        # 从 base64 解码证书和描述文件
        echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
        echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

        # 创建临时 Keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        # 导入证书到 Keychain
        security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security list-keychain -d user -s "$KEYCHAIN_PATH"

        # 安装描述文件
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        # 提取描述文件 UUID 并以 UUID 命名安装
        PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PP_PATH"))
        cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision
        echo "Provisioning profile installed: $PP_UUID"

    # ========== 构建 ==========

    # 读取 iOS 版本号
    - name: Get app version
      id: get_version
      run: |
        # 从 project.pbxproj 中提取 iOS target 的 MARKETING_VERSION
        VERSION=$(grep -A 50 'Pods-WxPusher-iOS.release.xcconfig' iosApp/wxpusher/wxpusher.xcodeproj/project.pbxproj | grep 'MARKETING_VERSION' | head -1 | awk -F '= ' '{print $2}' | tr -d ';' | tr -d ' ')
        echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"

    # 构建 Xcode Archive
    - name: Build archive
      run: |
        xcodebuild archive \
          -workspace wxpusher.xcworkspace \
          -scheme WxPusher-iOS \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath $RUNNER_TEMP/WxPusher-iOS.xcarchive \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM=8UU533BM7N \
          CODE_SIGN_IDENTITY="iPhone Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="wxpusher-appstore-distribution-push-login" \
          | xcpretty
      working-directory: iosApp

    # 创建导出配置文件
    - name: Create ExportOptions.plist
      run: |
        cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>8UU533BM7N</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>com.smjcco.wxpusher</key>
                <string>wxpusher-appstore-distribution-push-login</string>
            </dict>
        </dict>
        </plist>
        PLIST

    # 导出 IPA 文件
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/WxPusher-iOS.xcarchive \
          -exportPath $RUNNER_TEMP/ipa-output \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
          | xcpretty

    # 上传 IPA 产物
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: wxpusher-ios-v${{ steps.get_version.outputs.APP_VERSION }}-${{ github.run_id }}.ipa
        path: ${{ runner.temp }}/ipa-output/*.ipa

    # ========== 清理 ==========

    # 删除临时 Keychain，避免泄露证书
    - name: Clean up keychain
      if: ${{ always() }}
      run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
