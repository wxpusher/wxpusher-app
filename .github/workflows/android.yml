name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build Android APK
      run: ./gradlew clean :androidApp:assembleProdRelease
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        path: androidApp/build/outputs/apk/prod/release/wxpusher-app-*.apk