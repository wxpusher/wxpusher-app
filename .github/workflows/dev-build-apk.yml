name: Dev Build APK

on:
  # 推送到 dev 分支时自动触发
  push:
    branches:
      - dev
      - feature/*
  # 手动触发
  workflow_dispatch:

jobs:
  build-dev-apk:
    name: Build Dev APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 构建测试版 APK（使用 debug 签名，无需配置密钥）
    - name: Build Android Debug APK
      run: ./gradlew clean :androidApp:assembleOfflineDebug

    # 读取版本号
    - name: Get app version
      id: get_version
      run: |
        VERSION=$(grep "versionName" androidApp/build.gradle.kts | head -1 | awk -F '"' '{print $2}')
        echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT

    # 重命名 APK 文件
    - name: Prepare APK file
      id: prepare
      run: |
        APK_FILE=$(ls androidApp/build/outputs/apk/offline/debug/wxpusher-app-*.apk | head -1)
        NEW_NAME="wxpusher-app-v${{ steps.get_version.outputs.APP_VERSION }}-dev-${{ github.run_number }}.apk"
        cp "$APK_FILE" "$NEW_NAME"
        echo "APK_PATH=$NEW_NAME" >> $GITHUB_OUTPUT
        echo "APK_NAME=$NEW_NAME" >> $GITHUB_OUTPUT

    # 上传 APK 产物
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wxpusher-dev-apk-${{ github.run_number }}
        path: ${{ steps.prepare.outputs.APK_PATH }}
        retention-days: 7

    # 在 Summary 中显示下载链接
    - name: Add Job Summary
      run: |
        echo "## 📱 构建完成！" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
        echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
        echo "| 版本号 | ${{ steps.get_version.outputs.APP_VERSION }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 构建编号 | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 分支 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 下载方式" >> $GITHUB_STEP_SUMMARY
        echo "1. 点击页面顶部的 **Artifacts** 部分" >> $GITHUB_STEP_SUMMARY
        echo "2. 下载 **wxpusher-dev-apk-${{ github.run_number }}**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "> ⚠️ 注意：这是开发测试版本，使用 debug 签名" >> $GITHUB_STEP_SUMMARY
