name: Release iOS to TestFlight

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: '发布说明（可选）'
        required: false
        type: string
        default: ''

jobs:
  # 复用 Build iOS IPA workflow
  build:
    uses: ./.github/workflows/build-ios-ipa.yml
    secrets: inherit

  # 上传到 TestFlight
  upload:
    needs: build
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # 下载构建产物
      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./ipa-output

      # 配置 App Store Connect API Key
      - name: Set up App Store Connect API Key
        env:
          API_KEY_BASE64: ${{ secrets.IOS_APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.IOS_APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          # API Key 文件需要放在 ~/private_keys/ 目录下，命名格式为 AuthKey_{KEY_ID}.p8
          mkdir -p ~/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${API_KEY_ID}.p8
          echo "API Key file created: ~/private_keys/AuthKey_${API_KEY_ID}.p8"

      # 上传 IPA 到 App Store Connect（TestFlight）
      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.IOS_APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.IOS_APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          IPA_FILE=$(ls ./ipa-output/*.ipa | head -1)
          echo "Uploading IPA: $IPA_FILE"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
          echo "Upload to TestFlight completed successfully!"
      # 重命名 IPA 文件为更简洁的名称
      - name: Prepare IPA file
        id: prepare
        run: |
          IPA_FILE=$(ls ./ipa-output/*.ipa | head -1)
          RELEASE_IPA="./ipa-output/wxpusher-app-v${{ needs.build.outputs.app_version }}.ipa"
          mv "$IPA_FILE" "$RELEASE_IPA"
          echo "IPA_PATH=$RELEASE_IPA" >> $GITHUB_OUTPUT

      # 创建 GitHub Release 并上传 IPA
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.app_version }}-iOS
          name: WxPusher iOS v${{ needs.build.outputs.app_version }}
          body: |
            ## WxPusher iOS v${{ needs.build.outputs.app_version }}

            ${{ github.event.inputs.release_notes || '新版本发布' }}

            ---
            构建信息
            - 分支: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Run ID: `${{ github.run_id }}`
            - 构建时间: `${{ github.event.repository.updated_at }}`
          draft: true
          prerelease: false
          files: ${{ steps.prepare.outputs.IPA_PATH }}
          generate_release_notes: true
