name: Release iOS to TestFlight

on:
  pull_request:
    branches: [ release, unofficial_custom/* ]
  workflow_dispatch:
    inputs:
      create_release:
        description: '是否创建 GitHub Release'
        required: false
        type: boolean
        default: false
      release_notes:
        description: '发布说明（可选）'
        required: false
        type: string
        default: ''

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    # ========== 环境配置 ==========

    # KMM 项目需要 JDK 来编译 shared 模块
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 设置 Ruby 环境（CocoaPods 依赖）
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: false
        working-directory: iosApp

    # 安装 Bundler 依赖（自动添加当前平台，避免 Gemfile.lock 平台不匹配）
    - name: Bundle install
      run: |
        bundle lock --add-platform ruby
        bundle install --jobs 3
      working-directory: iosApp

    # KMM CocoaPods 集成需要先生成 dummy framework，否则 pod install 会失败
    - name: Generate KMM dummy framework
      run: ./gradlew :shared:generateDummyFramework

    # 安装 CocoaPods 依赖
    - name: Pod install
      run: bundle exec pod install --repo-update
      working-directory: iosApp

    # ========== 签名配置 ==========

    # 从 Secrets 导入证书和描述文件到临时 Keychain
    - name: Import certificate and provisioning profile
      env:
        CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
        CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: ${{ github.run_id }}
      run: |
        set -euo pipefail

        # 创建临时文件路径
        CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
        PP_PATH=$RUNNER_TEMP/profile.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        # 从 base64 解码证书和描述文件
        echo -n "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
        echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

        # 验证文件有效性
        echo "Certificate file size: $(wc -c < "$CERTIFICATE_PATH") bytes"
        echo "Provisioning profile size: $(wc -c < "$PP_PATH") bytes"

        # 创建临时 Keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        # 将临时 Keychain 加入搜索列表（保留原有 keychain，避免 security cms 等命令异常）
        security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
        security default-keychain -s "$KEYCHAIN_PATH"

        # 导入证书到 Keychain（使用 -T 指定 codesign 访问权限，兼容 macOS 新版本）
        security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -k "$KEYCHAIN_PATH"

        # 验证导入结果
        echo "Keychain identities:"
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

        # 允许 codesign 无弹窗访问私钥（-s 表示匹配可签名的密钥）
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        # 安装描述文件到 Xcode 识别的目录
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

        # 提取描述文件的 UUID 和 Name
        PP_PLIST=$(/usr/bin/security cms -D -i "$PP_PATH")
        PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$PP_PLIST")
        PP_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< "$PP_PLIST")

        echo "Provisioning profile name: $PP_NAME"
        echo "Provisioning profile UUID: $PP_UUID"

        # 验证 Profile 名称是否与 xcodebuild 中使用的一致
        if [ "$PP_NAME" != "Provisioning-WxPusher-Distribution" ]; then
          echo "::warning::Profile name '$PP_NAME' does not match expected 'Provisioning-WxPusher-Distribution'"
        fi

        # 以 UUID 为文件名安装描述文件
        cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision
        echo "Provisioning profile installed successfully: $PP_UUID"

        # 验证安装结果
        ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

    # ========== 构建 ==========

    # 读取 iOS 版本号
    - name: Get app version
      id: get_version
      run: |
        # 从 project.pbxproj 中提取 iOS target 的 MARKETING_VERSION
        VERSION=$(grep -A 50 'Pods-WxPusher-iOS.release.xcconfig' iosApp/wxpusher/wxpusher.xcodeproj/project.pbxproj | grep 'MARKETING_VERSION' | head -1 | awk -F '= ' '{print $2}' | tr -d ';' | tr -d ' ')
        echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"

        # 使用 github.run_number + 11000 作为 bundle version，确保每次构建递增且不重复
        BUNDLE_VERSION=$(( ${{ github.run_number }} + 11000 ))
        echo "BUNDLE_VERSION=$BUNDLE_VERSION" >> $GITHUB_OUTPUT
        echo "Bundle version (CFBundleVersion): $BUNDLE_VERSION"

    # 构建 Xcode Archive
    - name: Build archive
      run: |
        xcodebuild archive \
          -workspace wxpusher.xcworkspace \
          -scheme WxPusher-iOS \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath $RUNNER_TEMP/WxPusher-iOS.xcarchive \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM=8UU533BM7N \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="Provisioning-WxPusher-Distribution" \
          CURRENT_PROJECT_VERSION=${{ steps.get_version.outputs.BUNDLE_VERSION }}
      working-directory: iosApp

    # 创建导出配置文件
    - name: Create ExportOptions.plist
      run: |
        cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>8UU533BM7N</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>com.smjcco.wxpusher</key>
                <string>Provisioning-WxPusher-Distribution</string>
            </dict>
        </dict>
        </plist>
        PLIST

    # 导出 IPA 文件
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/WxPusher-iOS.xcarchive \
          -exportPath $RUNNER_TEMP/ipa-output \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

    # ========== 上传产物 ==========

    # 上传 IPA 产物，方便下载
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: wxpusher-ios-v${{ steps.get_version.outputs.APP_VERSION }}-${{ github.run_id }}-${{ steps.get_version.outputs.BUNDLE_VERSION }}.ipa
        path: ${{ runner.temp }}/ipa-output/*.ipa

    # ========== 发布 TestFlight ==========

    # 配置 App Store Connect API Key
    - name: Set up App Store Connect API Key
      env:
        API_KEY_BASE64: ${{ secrets.IOS_APP_STORE_CONNECT_API_KEY_BASE64 }}
        API_KEY_ID: ${{ secrets.IOS_APP_STORE_CONNECT_API_KEY_ID }}
      run: |
        mkdir -p ~/private_keys
        echo "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${API_KEY_ID}.p8
        echo "API Key file created: ~/private_keys/AuthKey_${API_KEY_ID}.p8"

    # 上传 IPA 到 App Store Connect（TestFlight）
    - name: Upload to TestFlight
      env:
        API_KEY_ID: ${{ secrets.IOS_APP_STORE_CONNECT_API_KEY_ID }}
        API_ISSUER_ID: ${{ secrets.IOS_APP_STORE_CONNECT_API_ISSUER_ID }}
      run: |
        IPA_FILE=$(ls $RUNNER_TEMP/ipa-output/*.ipa | head -1)
        echo "Uploading IPA: $IPA_FILE"
        xcrun altool --upload-app \
          --type ios \
          --file "$IPA_FILE" \
          --apiKey "$API_KEY_ID" \
          --apiIssuer "$API_ISSUER_ID"
        echo "Upload to TestFlight completed successfully!"

    # ========== GitHub Release（可选） ==========

    # 重命名 IPA 文件为更简洁的名称
    - name: Prepare IPA file
      if: ${{ inputs.create_release }}
      id: prepare
      run: |
        IPA_FILE=$(ls $RUNNER_TEMP/ipa-output/*.ipa | head -1)
        RELEASE_IPA="$RUNNER_TEMP/ipa-output/wxpusher-app-v${{ steps.get_version.outputs.APP_VERSION }}.ipa"
        mv "$IPA_FILE" "$RELEASE_IPA"
        echo "IPA_PATH=$RELEASE_IPA" >> $GITHUB_OUTPUT

    # 创建 GitHub Release 并上传 IPA
    - name: Create GitHub Release
      if: ${{ inputs.create_release }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.APP_VERSION }}-iOS
        name: WxPusher iOS v${{ steps.get_version.outputs.APP_VERSION }} - ${{ steps.get_version.outputs.BUNDLE_VERSION }}
        body: |
          ## WxPusher iOS v${{ steps.get_version.outputs.APP_VERSION }}

          ${{ github.event.inputs.release_notes || '新版本发布' }}

          ---
          构建信息
          - 分支: `${{ github.ref_name }}`
          - Commit: `${{ github.sha }}`
          - Run ID: `${{ github.run_id }}`
          - Bundle Version: `${{ steps.get_version.outputs.BUNDLE_VERSION }}`
          - 构建时间: `${{ github.event.repository.updated_at }}`
        draft: true
        prerelease: false
        files: ${{ steps.prepare.outputs.IPA_PATH }}
        generate_release_notes: true

    # ========== 清理 ==========

    # 删除临时 Keychain，避免泄露证书
    - name: Clean up keychain
      if: ${{ always() }}
      run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
